[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "roborean-documents-base"
version = "0.3.0"
description = "Document driver protocols and session manager for Roborean"
requires-python = ">=3.11"
dependencies = [
  "roborean-spec>=0.3.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/roborean_documents_base"]
