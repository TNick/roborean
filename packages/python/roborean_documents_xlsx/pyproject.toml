[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "roborean-documents-xlsx"
version = "0.1.11"
description = "XLSX document driver for Roborean"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
  "roborean-documents-base>=0.1.1",
  "roborean-spec>=0.1.1",
  "openpyxl>=3.1",
  "defusedxml>=0.7",
]

[project.entry-points."roborean.document_drivers"]
"roborean.xlsx" = "roborean_documents_xlsx.driver:create_driver"


[project.urls]
Homepage = "https://github.com/TNick/roborean"
Repository = "https://github.com/TNick/roborean"

[tool.hatch.build.targets.wheel]
packages = ["src/roborean_documents_xlsx"]
