[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "roborean-plugins-base"
version = "0.1.4"
description = "Plugin manifests and entry-point discovery for Roborean"
requires-python = ">=3.11"
license = "MIT"
readme = "README.md"
dependencies = [
  "roborean-spec>=0.1.1",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "black>=24.0", "isort>=5.0", "flake8>=7.0"]


[project.urls]
Homepage = "https://github.com/TNick/roborean"
Repository = "https://github.com/TNick/roborean"

[tool.hatch.build.targets.wheel]
packages = ["src/roborean_plugins_base"]
