[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "roborean-plugins-base"
version = "0.2.0"
description = "Plugin manifests and entry-point discovery for Roborean"
requires-python = ">=3.11"
dependencies = [
  "roborean-spec>=0.2.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "black>=24.0", "isort>=5.0", "flake8>=7.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/roborean_plugins_base"]
