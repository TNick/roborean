[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "roborean-documents-dxf"
version = "0.1.16"
description = "DXF document driver for Roborean"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
  "roborean-documents-base>=0.1.1",
  "roborean-spec>=0.1.1",
  "ezdxf>=1.3",
]

[project.entry-points."roborean.document_drivers"]
"roborean.dxf" = "roborean_documents_dxf.driver:create_driver"


[project.urls]
Homepage = "https://github.com/TNick/roborean"
Repository = "https://github.com/TNick/roborean"

[tool.hatch.build.targets.wheel]
packages = ["src/roborean_documents_dxf"]
