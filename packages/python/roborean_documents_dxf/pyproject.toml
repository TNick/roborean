[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "roborean-documents-dxf"
version = "0.3.0"
description = "DXF document driver for Roborean"
requires-python = ">=3.11"
dependencies = [
  "roborean-documents-base>=0.3.0",
  "roborean-spec>=0.3.0",
  "ezdxf>=1.3",
]

[project.entry-points."roborean.document_drivers"]
"roborean.dxf" = "roborean_documents_dxf.driver:create_driver"

[tool.hatch.build.targets.wheel]
packages = ["src/roborean_documents_dxf"]
