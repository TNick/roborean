[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "roborean-documents-image"
version = "0.1.10"
description = "Raster image document driver for Roborean"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
  "roborean-documents-base>=0.1.1",
  "roborean-spec>=0.1.1",
  "Pillow>=10.0",
]

[project.entry-points."roborean.document_drivers"]
"roborean.image" = "roborean_documents_image.driver:create_driver"


[project.urls]
Homepage = "https://github.com/TNick/roborean"
Repository = "https://github.com/TNick/roborean"

[tool.hatch.build.targets.wheel]
packages = ["src/roborean_documents_image"]
