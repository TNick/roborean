[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "roborean-engine"
version = "0.1.0"
description = "Deterministic Roborean Phase 1 compiler and runner"
requires-python = ">=3.11"
dependencies = [
  "jsonschema>=4.23",
  "roborean-spec>=0.1.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "black>=24.0", "isort>=5.0", "flake8>=7.0"]

[project.scripts]
roborean = "roborean_engine.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/roborean_engine"]

[tool.hatch.build]
include = ["src/roborean_engine/bits/manifests/*.json"]
