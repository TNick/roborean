# Deploy the browser-only web app to GitHub Pages.
name: Deploy static content to Pages

on:
  # Align site updates with library releases.
  push:
    tags:
      - "v*"

  # Allow manual deploys from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install and build static Pages bundle
        env:
          VITE_STORAGE_MODE: google
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_API_KEY: ${{ vars.VITE_GOOGLE_API_KEY }}
          VITE_GOOGLE_APP_ID: ${{ vars.VITE_GOOGLE_APP_ID }}
        run: |
          pnpm install --registry https://registry.npmjs.org/
          pnpm run build:pages
          test -f apps/web/dist/index.html
          test -n "${VITE_GOOGLE_CLIENT_ID}"

      - name: Write version manifest
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev"
          fi
          printf '{"version":"%s","commit":"%s","builtAt":"%s"}\n' \
            "$VERSION" "$GITHUB_SHA" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > apps/web/dist/version.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
