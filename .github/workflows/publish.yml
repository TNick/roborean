name: Publish

# Builds and publishes all publishable packages on distlift tag v*.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: make init-d

      - name: Lint and test
        run: |
          make lint
          make test

  publish-pypi:
    needs: gate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package-path: packages/python/roborean_spec
            github-environment: pypi-roborean-spec
          - package-path: packages/python/roborean_storage_base
            github-environment: pypi-roborean-storage-base
          - package-path: packages/python/roborean_storage_dict
            github-environment: pypi-roborean-storage-dict
          - package-path: packages/python/roborean_storage_sqlalchemy
            github-environment: pypi-roborean-storage-sqlalchemy
          - package-path: packages/python/roborean_plugins_base
            github-environment: pypi-roborean-plugins-base
          - package-path: packages/python/roborean_documents_base
            github-environment: pypi-roborean-documents-base
          - package-path: packages/python/roborean_documents_text
            github-environment: pypi-roborean-documents-text
          - package-path: packages/python/roborean_documents_markdown
            github-environment: pypi-roborean-documents-markdown
          - package-path: packages/python/roborean_documents_xlsx
            github-environment: pypi-roborean-documents-xlsx
          - package-path: packages/python/roborean_documents_docx
            github-environment: pypi-roborean-documents-docx
          - package-path: packages/python/roborean_documents_image
            github-environment: pypi-roborean-documents-image
          - package-path: packages/python/roborean_documents_dxf
            github-environment: pypi-roborean-documents-dxf
          - package-path: packages/python/roborean_engine
            github-environment: pypi-roborean-engine
          - package-path: packages/python/roborean_api_fastapi
            github-environment: pypi-roborean-api-fastapi
    environment: ${{ matrix.github-environment }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        working-directory: ${{ matrix.package-path }}
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ matrix.package-path }}/dist

  publish-npm:
    needs: gate
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install npm with trusted publishing support
        run: npm install -g npm@latest

      - name: Install and build
        run: |
          pnpm install --registry https://registry.npmjs.org/
          pnpm run build:packages

      # OIDC: do not set NODE_AUTH_TOKEN — pnpm/npm exchange GitHub id-token.
      - name: Publish @roborean packages
        run: |
          set -euo pipefail
          for pkg in \
            @roborean/spec \
            @roborean/engine \
            @roborean/documents-base \
            @roborean/documents-text \
            @roborean/documents-markdown \
            @roborean/documents-preview \
            @roborean/validation \
            @roborean/api-types \
            @roborean/ui \
            @roborean/editor \
            @roborean/google-workspace
          do
            echo "Publishing ${pkg}..."
            pnpm --filter "${pkg}" publish --access public --no-git-checks
          done

  publish-pages:
    needs: [gate, publish-pypi, publish-npm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install and build static Pages bundle
        env:
          VITE_STORAGE_MODE: google
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
        run: |
          pnpm install --registry https://registry.npmjs.org/
          pnpm run build:pages
          test -f apps/web/dist/index.html
          test -n "${VITE_GOOGLE_CLIENT_ID}"

      - name: Write version manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          printf '{"version":"%s","commit":"%s","builtAt":"%s"}\n' \
            "$VERSION" "$GITHUB_SHA" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > apps/web/dist/version.json

      - name: Publish gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apps/web/dist
          publish_branch: gh-pages
          force_orphan: true
