# distlift: lockstep releases — one Git tag v{version} updates all manifests.
# Local: distlift release simple --patch (or --release-version X.Y.Z)
# CI: .github/workflows/publish.yml on tag push v*

[release]
mode = "simple"
tag_template = "v{version}"
version_source = "tag"
default_version = "0.1.0"
version_format = "major-minor-patch"
remotes = ["origin"]

[changelog]
enabled = true
path = "CHANGELOG.md"
compare_url_template = "https://github.com/TNick/roborean/compare/{prev}...{next}"

[dependency_updates]
enabled = true
include_current_monorepo = true
python_version_template = ">={version}"
javascript_version_template = "^{version}"

